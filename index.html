<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Huntress Cookbook</title>
  <link rel="stylesheet" href="css/cookbook.css">
  <style>html:not(.auth-ok) body > :not(#auth-gate) { display: none; }</style>
  <script src="js/auth.js"></script>
</head>
<body data-nav-scope="landing">

  <div class="landing">
    <img class="landing-logo" src="assets/fox-huntress-logo.png" alt="Fox &amp; Huntress">
    <h1>THE HUNTRESS COOKBOOK</h1>
    <p class="subtitle">Made with care, for the Huntress ♥</p>

    <div class="landing-search-wrap no-print">
      <input type="search" id="landing-search" class="landing-search" placeholder="Search cookbook… (Ctrl+K)" readonly>
    </div>

    <ol class="landing-nav" data-cookbook-landing-nav></ol>

    <p class="landing-tagline">Good food, good mood, best day. ♥</p>

    <p class="print-hint no-print">
      Open any chapter and press <strong>Ctrl+P</strong> to save as PDF.<br>
      Recipe photos are in <code>assets/images/</code> (see <code>PHOTO-CREDITS.md</code> for sources).
    </p>
  </div>

  <script src="js/recipes.js"></script>
  <script src="js/vendor/fuse.min.js"></script>
  <script src="js/search-index.js"></script>
  <script src="js/search.js"></script>
  <script src="js/cookbook.js"></script>
</body>
</html>
